<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Rock World</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .portada {
            text-align: center;
            width: min(520px, 100%);
        }

        h1 {
            margin: 0 0 32px;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            letter-spacing: 0.04em;
            color: #f8fafc;
        }

        .busqueda {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 1rem;
        }

        input:focus {
            outline: 2px solid #38bdf8;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #7dd3fc;
        }

        #resultados {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }

        #resultados li {
            margin-bottom: 8px;
        }

        #resultados a {
            display: block;
            padding: 10px 12px;
            background: #1e293b;
            border-radius: 8px;
            color: #7dd3fc;
            text-decoration: none;
        }

        #resultados a:hover {
            background: #334155;
        }

        #mensaje {
            color: #94a3b8;
            font-size: 0.95rem;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="portada">
        <h1>Universal Rock World</h1>

        <div class="busqueda">
            <input type="search" id="buscar" placeholder="Buscar banda..." autocomplete="off">
            <button type="button" id="btnBuscar">Buscar</button>
        </div>

        <p id="mensaje"></p>
        <ul id="resultados"></ul>
    </div>

    <script>
        const bandas = [
            { nombre: "Breaking Benjamin", pagina: "index.html", palabras: "breaking benjamin rock alternativo" },
            { nombre: "Slipknot", pagina: "", palabras: "slipknot metal" },
            { nombre: "Chevelle", pagina: "", palabras: "chevelle rock alternativo" },
            { nombre: "Linkin Park", pagina: "", palabras: "linkin park rock" },
            { nombre: "Three Days Grace", pagina: "", palabras: "three days grace rock" }
        ];

        const input = document.getElementById("buscar");
        const lista = document.getElementById("resultados");
        const mensaje = document.getElementById("mensaje");
        const btn = document.getElementById("btnBuscar");

        function buscar() {
            const texto = input.value.trim().toLowerCase();
            lista.innerHTML = "";

            if (!texto) {
                mensaje.textContent = "Escribí el nombre de una banda.";
                return;
            }

            const encontradas = bandas.filter((b) =>
                b.nombre.toLowerCase().includes(texto) ||
                b.palabras.includes(texto)
            );

            if (!encontradas.length) {
                mensaje.textContent = "No hay bandas con ese nombre en el sitio.";
                return;
            }

            mensaje.textContent = encontradas.length === 1
                ? "1 banda encontrada:"
                : encontradas.length + " bandas encontradas:";

            encontradas.forEach((banda) => {
                const li = document.createElement("li");
                if (banda.pagina) {
                    const enlace = document.createElement("a");
                    enlace.href = banda.pagina;
                    enlace.textContent = banda.nombre;
                    li.appendChild(enlace);
                } else {
                    li.textContent = banda.nombre + " (próximamente)";
                    li.style.padding = "10px 12px";
                    li.style.background = "#1e293b";
                    li.style.borderRadius = "8px";
                    li.style.color = "#94a3b8";
                }
                lista.appendChild(li);
            });
        }

        btn.addEventListener("click", buscar);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                buscar();
            }
        });
        input.addEventListener("input", buscar);
    </script>
</body>
</html>
