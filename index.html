<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Rock Universal</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        body.portal {
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --intro-heading: #38bdf8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .portal-box {
            text-align: center;
            width: min(520px, 100%);
        }

        .portal-box h1 {
            margin: 0 0 32px;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            letter-spacing: 0.04em;
            color: #f8fafc;
        }

        #resultados {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }

        #resultados li {
            margin-bottom: 8px;
        }

        #resultados a {
            display: block;
            padding: 10px 12px;
            background: #1e293b;
            border-radius: 8px;
            color: #7dd3fc;
            text-decoration: none;
        }

        #resultados a:hover {
            background: #334155;
        }

        #mensaje {
            color: #94a3b8;
            font-size: 0.95rem;
            min-height: 1.2em;
        }
    </style>
</head>
<body class="portal theme-bb">
    <div class="portal-box">
        <h1>Wiki Rock Universal</h1>

        <div class="search-box search-box--hero">
            <input type="search" id="buscar" placeholder="Buscar banda..." autocomplete="off">
            <button type="button" class="search-btn" id="btnBuscar">Buscar</button>
        </div>

        <p id="mensaje" style="margin-top: 1rem;"></p>
        <ul id="resultados"></ul>
    </div>

    <script>
        const bandas = [
            { nombre: "Breaking Benjamin", pagina: "Breaking_Benjamin.html", palabras: "breaking benjamin rock alternativo" },
            { nombre: "Slipknot", pagina: "slipknot.html", palabras: "slipknot metal nu metal corey taylor" },
            { nombre: "Chevelle", pagina: "", palabras: "chevelle rock alternativo" },
            { nombre: "Linkin Park", pagina: "", palabras: "linkin park rock" },
            { nombre: "Three Days Grace", pagina: "", palabras: "three days grace rock" }
        ];

        const input = document.getElementById("buscar");
        const lista = document.getElementById("resultados");
        const mensaje = document.getElementById("mensaje");
        const btn = document.getElementById("btnBuscar");

        function buscar() {
            const texto = input.value.trim().toLowerCase();
            lista.innerHTML = "";

            if (!texto) {
                mensaje.textContent = "Escribí el nombre de una banda.";
                return;
            }

            const encontradas = bandas.filter((b) =>
                b.nombre.toLowerCase().includes(texto) ||
                b.palabras.includes(texto)
            );

            if (!encontradas.length) {
                mensaje.textContent = "No hay bandas con ese nombre en el sitio.";
                return;
            }

            mensaje.textContent = encontradas.length === 1
                ? "1 banda encontrada:"
                : encontradas.length + " bandas encontradas:";

            encontradas.forEach((banda) => {
                const li = document.createElement("li");
                if (banda.pagina) {
                    const enlace = document.createElement("a");
                    enlace.href = banda.pagina;
                    enlace.textContent = banda.nombre;
                    li.appendChild(enlace);
                } else {
                    li.textContent = banda.nombre + " (próximamente)";
                    li.style.padding = "10px 12px";
                    li.style.background = "#1e293b";
                    li.style.borderRadius = "8px";
                    li.style.color = "#94a3b8";
                }
                lista.appendChild(li);
            });
        }

        btn.addEventListener("click", buscar);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                buscar();
            }
        });
        input.addEventListener("input", buscar);
    </script>
</body>
</html>
