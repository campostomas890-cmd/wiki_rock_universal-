<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio sesion / Wiki Rock Universal</title>
    <meta name="description" content="Inicio sesion en Wiki Rock Universal">
    <meta name="keywords" content="Wiki Rock Universal, Inicio sesion, Registro de usuarios">
    <meta name="author" content="Tomás Andrés Campos">
    <meta property="og:title" content="Inicio sesion / Wiki Rock Universal">
    <meta property="og:description" content="Inicio sesion en Wiki Rock Universal">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/4/42/Corey_Taylor_%282019%29.jpg">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="registrarse_usuario.css">
</head>
<body class="contenedor-pantalla-rock">

    <div class="contenedor-rock">
        <h1 class="titulo-rock">Wiki Rock Universal</h1>
        
        <form>
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Nombre de usuario</label>
                <input type="Nombre de usuario" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text">Nunca compartiremos tu usuario como inicio iniciar-sesion.</div>
            </div>
            
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="exampleInputPassword1">
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                <label class="form-check-label" for="exampleCheck1">Recordar</label>
            </div>
            
            <button type="Iniciar sesion" class="btn btn-primary btn-enviar-rock">Iniciar sesion</button>
        </form>
    </div>

</body>
</html>
